name: Publish Packages

on:
  push:
    branches: [ main ]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip the run triggered by lerna's own release commit to avoid a loop
    if: "!contains(github.event.head_commit.message, 'chore(release): publish')"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'yarn'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@mariner'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Build packages
      run: npm run build

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    # lerna publish (with conventionalCommits in lerna.json) bumps versions,
    # commits, tags, pushes to main, and publishes changed packages to the registry.
    - name: Version and publish packages
      run: npx lerna publish --yes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
